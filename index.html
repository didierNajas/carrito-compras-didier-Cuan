<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Tienda</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Mi Tienda</span>
    <span class="badge bg-danger" id="badge">0</span>
</nav>

<div class="container mt-4">
    <div class="row">

        <!-- PRODUCTOS -->
        <div class="col-md-8">
            <div class="row">

                <!-- CARD 1 -->
                <div class="col-md-6 mb-3">
                    <div class="card p-3">
                        <h5>Producto 1</h5>
                        <p>$10.000</p>
                        <button class="btn btn-primary btn-agregar"
                            data-nombre="Producto 1"
                            data-precio="10000">Agregar</button>
                    </div>
                </div>

                <!-- CARD 2 -->
                <div class="col-md-6 mb-3">
                    <div class="card p-3">
                        <h5>Producto 2</h5>
                        <p>$20.000</p>
                        <button class="btn btn-primary btn-agregar"
                            data-nombre="Producto 2"
                            data-precio="20000">Agregar</button>
                    </div>
                </div>

                <!-- CARD 3 -->
                <div class="col-md-6 mb-3">
                    <div class="card p-3">
                        <h5>Producto 3</h5>
                        <p>$15.000</p>
                        <button class="btn btn-primary btn-agregar"
                            data-nombre="Producto 3"
                            data-precio="15000">Agregar</button>
                    </div>
                </div>

                <!-- CARD 4 -->
                <div class="col-md-6 mb-3">
                    <div class="card p-3">
                        <h5>Producto 4</h5>
                        <p>$8.000</p>
                        <button class="btn btn-primary btn-agregar"
                            data-nombre="Producto 4"
                            data-precio="8000">Agregar</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- CARRITO -->
        <div class="col-md-4">
            <h4>Carrito</h4>

            <ul id="lista-carrito" class="list-group mb-3">
                <li id="msg-vacio" class="list-group-item text-center">
                    Tu carrito está vacío
                </li>
            </ul>

            <p><strong>Total: </strong><span id="total">$0</span></p>

            <button id="btn-vaciar" class="btn btn-danger w-100">
                Vaciar carrito
            </button>
        </div>

    </div>
</div>

<!-- JS -->
<script src="app.js"></script>
</body>
</html>
