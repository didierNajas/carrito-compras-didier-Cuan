<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 ShopPro - Carrito de Compras</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Styles personalizados -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- NAVBAR PRO -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm px-4">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">Carro de compras</span>

            <div class="d-flex align-items-center">
                <span class="me-2 text-white">Carrito</span>
                <span class="badge bg-danger fs-6" id="badge">0</span>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row g-4">

            <!-- PRODUCTOS -->
            <div class="col-lg-8">
                <div class="row g-4">

                    <!-- PRODUCTO -->
                    <div class="col-md-6">
                        <div class="card producto-card h-100">
                            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&h=400&fit=crop" class="card-img-top" alt="Audífonos">
                            <div class="card-body">
                                <h5 class="card-title">Audífonos</h5>
                                <p class="precio">$80.000</p>
                                <button class="btn btn-dark w-100 btn-agregar"
                                    data-nombre="Audífonos"
                                    data-precio="80000">Agregar al carrito</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card producto-card h-100">
                            <img src="https://images.unsplash.com/photo-1527814050087-3793815479db?w=500&h=400&fit=crop" class="card-img-top" alt="Mouse Gamer">
                            <div class="card-body">
                                <h5>Mouse Gamer</h5>
                                <p class="precio">$50.000</p>
                                <button class="btn btn-dark w-100 btn-agregar"
                                    data-nombre="Mouse Gamer"
                                    data-precio="50000">Agregar al carrito</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card producto-card h-100">
                            <img src="https://img.terabyteshop.com.br/produto/g/teclado-mecanico-gamer-redragon-dragonborn-rgb-switch-red-black-abnt-2-k630rgb-1-pt-red_151045.jpg">
                            <div class="card-body">
                                <h5>Teclado RGB</h5>
                                <p class="precio">$120.000</p>
                                <button class="btn btn-dark w-100 btn-agregar"
                                    data-nombre="Teclado RGB"
                                    data-precio="120000">Agregar</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card producto-card h-100">
                            <img src="https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=500&h=400&fit=crop" class="card-img-top" alt="Monitor">
                            <div class="card-body">
                                <h5>Monitor</h5>
                                <p class="precio">$700.000</p>
                                <button class="btn btn-dark w-100 btn-agregar"
                                    data-nombre="Monitor"
                                    data-precio="700000">Agregar</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- CARRITO PRO -->
            <div class="col-lg-4">
                <div class="card shadow carrito-card">
                    <div class="card-body">
                        <h4 class="mb-3">Lista de tu Carrito</h4>

                        <ul id="lista-carrito" class="list-group mb-3">
                            <li id="msg-vacio" class="list-group-item text-center text-muted">
                                Tu carrito está vacío
                            </li>
                        </ul>

                        <div class="d-flex justify-content-between mb-3">
                            <strong>Total:</strong>
                            <span id="total">$0</span>
                        </div>

                        <button id="btn-vaciar" class="btn btn-outline-danger w-100">
                            Vaciar carrito
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script del carrito -->
    <script src="app.js"></script>
</body>
</html>
</div>
